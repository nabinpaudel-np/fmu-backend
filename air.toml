# Working directory
root = "."
tmp_dir = "tmp"

[build]
bin = "tmp/main"
cmd = "go build -o ./tmp/main ."
delay = 1000
exclude_dir = ["assets", "tmp", "vendor", "postgres_data", "pgadmin_data"]
exclude_regex = "_test\\.go"
exclude_unchanged = false
follow_symlink = false
include_ext = ["go", "tpl", "tmpl", "html"]
kill_delay = "0s"
log = "build-errors.log"
send_interrupt = false
stop_on_error = true

[log]
time = false

[misc]
clean_on_exit = true
