version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema: "schema.sql"
    gen:
      go:
        package: "sqlc"
        out: "sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_pointers_for_null_types: true
        emit_prepared_queries: false
        emit_interface: false
        emit_empty_slices: true
        emit_exact_table_names: false
        rename:
          id: "ID"
          oauth_provider: "Provider"
          oauth_id: "ProviderID"
        overrides:
          - db_type: "uuid"
            go_type:
              type: "string"
          - db_type: "pg_catalog.timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "numeric"
            go_type:
              type: "string"
